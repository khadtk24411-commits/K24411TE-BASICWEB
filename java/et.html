
<html>
<head>
    <meta charset='utf-8'>
    <title>Tiêu đề trang</title>
    <script type="text/javascript">
        function Caculate(a){
            if(a=='1'){
                ketqua=eval(QT.value)*0.3+eval(GK.value)*0.2+eval(CK.value)*0.5;
                GPA.value=ketqua
                QT1.innerHTML="<font color='blue'>30%</font>";
                 GK1.innerHTML="<font color='blue'>20%</font>";
                  CK1.innerHTML="<font color='blue'>50%</font>";
                
            }
            else if(a=='2'){
                 ketqua=eval(QT.value)*0.25+eval(GK.value)*0.25+eval(CK.value)*0.5;
                 GPA.value=ketqua
                 QT1.innerHTML="<font color='blue'>25%</font>";
                 GK1.innerHTML="<font color='blue'>25%</font>";
                  CK1.innerHTML="<font color='blue'>50%</font>";
            }
            else{
                 ketqua=eval(QT.value)*0.15+eval(GK.value)*0.2+eval(CK.value)*0.5 + eval(T.value)*0.15;
                 GPA.value=ketqua
                 QT1.innerHTML="<font color='blue'>15%</font>";
                 GK1.innerHTML="<font color='blue'>20%</font>";
                CK1.innerHTML="<font color='blue'>50%</font>";
                T1.innerHTML="<font color='blue'>15%</font>";
                
            }
            
        }

    </script>
</head>
<body>
    <h1>GPA Caculate</h1>
    <p>Select Course</p>
    <select name="course" id="course">
        <option value="1">Course 1</option>
        <option value="2">Course 2</option>
        <option value="3">Course 3</option>
    </select>
    <p>QT <input type="number" name="QT" id="QT"> <span id="QT1"></span></p>
    <p>GK <input type="number" name="GK" id="GK"><span id="GK1"></span></p>
    <p>CK <input type="number" name="CK" id="CK"><span id="CK1"></span></p>
    <p>T <input type="number" name="T" id="T"><span id="T1"></span></p>
    <input type="button" name="GPA" value="GPA"onclick="Caculate(course.value)">
    <p>GPA: <input type="text" name="GPA" id="GPA" ></p>


</body>
</html>
