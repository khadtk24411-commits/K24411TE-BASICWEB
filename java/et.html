
<html>
<head>
    <meta charset='utf-8'>
    <title>Tiêu đề trang</title>
    <script type="text/javascript">
        function Caculate(a){
            if(a=='1'){
                ketqua=eval(QT.value)*0.3+eval(GK.value)*0.2+eval(CK.value)*0.5;
                GPA.value=ketqua
            }
            else if(a=='2'){
                 ketqua=eval(QT.value)*0.25+eval(GK.value)*0.25+eval(CK.value)*0.5;
                 GPA.value=ketqua
            }
            else{
                 ketqua=eval(QT.value)*0.15+eval(GK.value)*0.2+eval(CK.value)*0.5 + eval(T.value)*0.18;
                 GPA.value=ketqua
            }
            
        }

    </script>
</head>
<body>
    <h1>GPA Caculate</h1>
    <p>Select Course</p>
    <select name="course" id="course">
        <option value="1">Course 1</option>
        <option value="2">Course 2</option>
        <option value="3">Course 3</option>
    </select>
    <p>QT <input type="number" name="QT" id="QT"></p>
    <p>GK <input type="number" name="GK" id="GK"></p>
    <p>CK <input type="number" name="CK" id="CK"></p>
    <p>T <input type="number" name="T" id="T"></p>
    <input type="button" name="GPA" value="GPA"onclick="Caculate(course.value)">
    <p>GPA: <input type="text" name="GPA" id="GPA" ></p>


</body>
</html>
